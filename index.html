<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Video Belajar</title>
    <link 
        rel="shortcut icon" 
        href="./images/Logo.png"
        type="image/x-icon">
    <link rel="stylesheet" href="./styles/login.css">
</head>
<body>
    <header>
     <div class="nav-bar-container">
        <img src="./images/Logo.png" alt="video-belajar-logo">
     </div>
    </header>
    <main class="login-container">
        <div class="login-form">
            <div class="login-card-title">
             <h1>Masuk ke Akun</h1>
             <p>Yuk, lanjutin belajarmu di videobelajar</p>
             </div>
             <form action="#" method="post">
                 <div class="form-group">
                 <label for="email" id="email">E-Mail <span>*</span></label>
                 <input  
                    type="email"  
                    id="email" 
                    name="email" 
                    required
                    />
                 </div>   
                 <div class="form-group">
                 <label for="password">Kata Sandi <span>*</span></label>
                 <input
                    type="password" 
                    id="password" 
                    name="password" 
                    required>
                 <img src="./images/mdi_eye-off.png" alt="eye-off-icon">
                 
                 </div>
                 <a href="#">Lupa Password?</a>
                 <!-- <div id="lupa-password">
                     <a href="#">Lupa Password?</a>
                 </div> -->
                 <div class="login-card-action">
                    <button type="submit"
                     class="login-button">Masuk
                    </button>
                    <button type="button" class=" signup-button"><a href="./register.html"
                    >Daftar</a>
                    </button>
                    <p class="login-card-action">atau</p>
                    <button type="button" class="login-button google-button">
                         <img src="./images/logos_google-icon.png"
                            alt="google-icon"> 
                         <p>Masuk dengan Google</p>
                    </button>          
                 </div>
                 
            </form>
        </div>
        
    </main>
    
</body>
</html>
