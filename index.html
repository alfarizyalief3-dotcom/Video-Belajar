<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Video Belajar</title>
    <link 
        rel="shortcut icon" 
        href="./images/Logo.png"
        type="image/x-icon">
    <link rel="stylesheet" href="./styles/login.css">
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <div class="container">
            <div class="navbar-box">
                <img src="./images/Logo-videobelajar.png">
            </div>
        </div>
    </div>
    <!-- Navbar -->

    <!-- Login -->
    <main class="login-container">
        <div class="login-form">
            <div class="login-card-title">
                <h1>Masuk ke Akun</h1>
                <p>Yuk, lanjutin belajarmu di videobelajar</p>
            </div>
            <form action="#" method="post">
                <div class="form-email">
                    <label for="email" id="email">E-Mail <span>*</span></label>
                    <input  
                    type="email"  
                    id="email" 
                    name="email" 
                    required
                    />
                </div>   
                <div class="form-password">
                    <label for="password">Kata Sandi <span>*</span></label>
                    <input
                    type="password" 
                    id="password" 
                    name="password" 
                    required>
                    <img src="./images/mdi_eye-off.png" alt="eye-off-icon">
                </div>
                <div class="lupa">
                    <a href="#">Lupa Password?</a>
                </div>
                <div class="login-card-action">
                    <button type="submit"
                    class="login-button">Masuk
                    </button>
                    <button type="button" class=" signup-button"><a href="./register.html"
                        >Daftar</a>
                    </button>
                    <p>atau</p>
                </div>
                <div class="google">
                    <button type="button" class="google-button">
                        <img src="./images/logos_google-icon.png"
                        alt="google-icon"> 
                        <p>Masuk dengan Google</p>
                    </button>          
                </div>
            </form>
        </div>
    </main>
    <!-- Login -->
    
</body>
</html>
